services:
  postgres:
    image: postgres:15-alpine
    container_name: aetherion_postgres
    environment:
      POSTGRES_USER: aetherion
      POSTGRES_PASSWORD: aetherion_secret
      POSTGRES_DB: aetherion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetherion"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aetherion_net

  redis:
    image: redis:7-alpine
    container_name: aetherion_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - aetherion_net

  minio:
    image: minio/minio:latest
    container_name: aetherion_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - aetherion_net

  gateway:
    build: ./gateway
    container_name: aetherion_gateway
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://aetherion:aetherion_secret@postgres:5432/aetherion
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./gateway:/app
    networks:
      - aetherion_net

  orchestrator:
    build: ./orchestrator
    container_name: aetherion_orchestrator
    environment:
      DATABASE_URL: postgresql://aetherion:aetherion_secret@postgres:5432/aetherion
      REDIS_URL: redis://redis:6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}  # ← берётся из .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./orchestrator:/app
    networks:
      - aetherion_net

  frontend:
    build: ./frontend
    container_name: aetherion_frontend
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - gateway
    networks:
      - aetherion_net

  nginx:
    image: nginx:alpine
    container_name: aetherion_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway
      - frontend
    networks:
      - aetherion_net

networks:
  aetherion_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data: